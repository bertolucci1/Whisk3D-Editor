<style>
  html, body { margin:0; padding:0; width:100%; height:100vh; height:100dvh; overflow:hidden;
               background:#14171c; color:#c9d1d9; font-family:system-ui,Segoe UI,Roboto,sans-serif; }
  /* el canvas ocupa el area VISIBLE. 100dvh (dynamic viewport height) = alto sin el toolbar del navegador:
     en iOS Safari 100vh incluye la zona bajo la barra de direcciones -> tapaba la UI de abajo (Propiedades
     en vertical). Con dvh el canvas sigue el area visible aunque el iPhone muestre/oculte el toolbar. */
  #canvas { display:block; width:100vw; height:100vh; height:100dvh; border:0; outline:none; }

  /* pantalla de carga: el editor precarga res/ (skins/fuentes) -> tarda un momento */
  #loader { position:fixed; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:14px;
            background:#14171c; transition:opacity .4s; z-index:10; }
  #loader.hidden { opacity:0; pointer-events:none; }
  #loader h1 { margin:0; font-size:22px; letter-spacing:2px; font-weight:600; }
  #loader small { opacity:.6; font-size:12px; }
  .spin { width:34px; height:34px; border:3px solid #2b323c; border-top-color:#e8913a;
          border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>

  <div id="loader">
    <div class="spin"></div>
    <h1>WHISK3D</h1>
    <small id="loadstatus">cargando&hellip;</small>
  </div>

  <script>
    var statusEl = document.getElementById('loadstatus');
    var loaderEl = document.getElementById('loader');
    var canvasEl = document.getElementById('canvas');

    function ocultarLoader() {
      loaderEl.classList.add('hidden');
      canvasEl.focus(); // que el teclado llegue al editor
    }

    // ERROR VISIBLE EN PANTALLA: si el WASM no instancia (iOS Safari, memoria, feature no soportada) el usuario
    // solo veia "cargando" -> pantalla en blanco. Mostramos el error en el loader para poder diagnosticar.
    function mostrarError(msg) {
      if (!statusEl) return;
      statusEl.style.color = '#ff6b6b'; statusEl.style.whiteSpace = 'pre-wrap'; statusEl.style.fontSize = '12px';
      statusEl.style.maxWidth = '92vw'; statusEl.style.display = 'block';
      statusEl.textContent = 'ERROR: ' + String(msg).slice(0, 400);
      if (loaderEl) loaderEl.classList.remove('hidden');
    }
    window.addEventListener('error', function (e) { mostrarError((e && (e.message || e.error)) || 'error desconocido'); });
    window.addEventListener('unhandledrejection', function (e) { mostrarError((e && e.reason && (e.reason.message || e.reason)) || 'promise rechazada'); });

    var Module = {
      canvas: (function () {
        // si el navegador pierde el contexto WebGL, avisamos en vez de quedar en negro
        canvasEl.addEventListener('webglcontextlost', function (e) {
          e.preventDefault();
          statusEl.textContent = 'se perdio el contexto WebGL (recarga la pagina)';
          loaderEl.classList.remove('hidden');
        }, false);
        return canvasEl;
      })(),
      onAbort: function (what) { mostrarError('abort: ' + what); }, // emscripten aborta (ej: no pudo alocar memoria)
      printErr: function (t) { console.error(t); if (/abort|memory|Out of|RangeError|cannot enlarge/i.test(String(t))) mostrarError(t); },
      // texto de progreso mientras baja el .wasm/.data
      setStatus: function (t) { if (statusEl && t) statusEl.textContent = t; },
      // cuando el runtime esta listo el editor ya arranco (main() NO retorna: usa
      // emscripten_set_main_loop) -> ocultamos el loader un toque despues del 1er frame
      onRuntimeInitialized: function () { setTimeout(ocultarLoader, 400); }
    };

    // red de seguridad: si por lo que sea onRuntimeInitialized no corre, igual lo sacamos
    window.addEventListener('load', function () { setTimeout(ocultarLoader, 6000); });

    // el teclado va al canvas: al hacer click le damos foco
    canvasEl.addEventListener('mousedown', function () { canvasEl.focus(); });
  </script>
  {{{ SCRIPT }}}
</body>
